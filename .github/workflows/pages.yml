name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A6A575: ${{ secrets.A6A575 }}
          BC50F6: ${{ secrets.BC50F6 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A6A575', '')
          sec_b = os.environ.get('BC50F6', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- ac1f9616d1e7e26a -->', sec_a)
          if sec_b:
              after = after.replace('<!-- 272c9ba9eacaac7f14532294cd -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
